name: Refresh sector risk model

on:
  schedule:
    # 03:00 UTC on the 1st of every month
    - cron: "0 3 1 * *"
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  refit-model:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests pandas numpy statsmodels pyarrow openpyxl xlrd

      - name: Run pipeline
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: python scripts/fetch_and_fit.py

      - name: Open pull request with updated model
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Monthly model refresh: update sector weights and forecasts"
          title: "Monthly model refresh - ${{ github.run_id }}"
          body: |
            Automated monthly refit of the sector risk model.

            Generated by the scheduled `fetch_and_fit.py` run. Review the
            diff in `data/model_output.json` before merging — check for any
            sector's confidence label flipping (e.g. robust to
            not_significant), which would be worth a closer look before
            it goes live on the dashboard.
          branch: automated/monthly-model-refresh
          delete-branch: true
          add-paths: |
            data/model_output.json
